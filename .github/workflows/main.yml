name: Docker Build and Push

on:
  push:
    branches: [ "main" ] # Roda sempre que houver push na main
    tags: ["v*"] # Agora ele também roda quando você cria uma tag v1.0
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'docker-compose.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend # Ajuste para o nome da sua pasta
          push: true
          tags:  |
            ghcr.io/${{ github.repository }}/backend:latest
            ghcr.io/${{ github.repository }}/backend:${{ github.sha }}
            ghcr.io/${{ github.repository }}/backend:${{ github.ref_name }}

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend # Ajuste para o nome da sua pasta
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/frontend:latest
            ghcr.io/${{ github.repository }}/frontend:${{ github.sha }}
            ghcr.io/${{ github.repository }}/frontend:${{ github.ref_name }}
