
services:
  gpricemonitor-backend:
    # build: ./backend
    image: ghcr.io/carlosgruthner/gprice-monitor/backend:latest
    container_name: gpricemonitor-backend
    ports:
      - "4000:4000"
    volumes:
      - /etc/localtime:/etc/localtime:ro # Sincroniza o relógio com o Linux hospedeiro
      - /etc/timezone:/etc/timezone:ro
      - ./data:/app/data
      - ./backend:/app/data
    environment:
      - TZ=America/Sao_Paulo  # Define o fuso horário para o Node.js
      - DTABASE_PATH=/app/data/precos.db
      - RESEND_API_KEY=${RESEND_API_KEY}
      - EMAIL_FROM=${EMAIL_FROM}
      - EMAIL_TO=${EMAIL_TO}
    restart: always

  gpricemonitor:
    # build: ./frontend
    image: ghcr.io/carlosgruthner/gprice-monitor/frontend:latest
    container_name: gpricemonitor
    ports:
      - "3001:3000"
    depends_on:
      - backend
    environment:
      - EXTERNAL_API_IP=192.168.1.50 # Altere aqui quando mudar de local
      - EXTERNAL_API_PORT=3001
    restart: always